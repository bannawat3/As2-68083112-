<!DOCTYPE html>

    <style>
        /* ตกแต่งรูปภาพตาม Lab 2 */
        img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            transition: 0.5s;
            border: 5px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Hover Effect ตามโจทย์ */
        img:hover {
            transform: scale(1.1);
            filter: brightness(80%);
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* ตกแต่ง Footer ให้ดูดีตามสี Navbar */
        footer {
            background-color: #212529;
            color: white;
            padding: 30px 0;
            margin-top: 50px;
        }
    </style>
</head>

    <nav class="navbar navbar-dark bg-dark mb-4">
